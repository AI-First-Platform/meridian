name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: npm test

      - name: Build
        run: bun run build

      - name: Bump version
        id: version
        run: |
          npm version ${{ inputs.bump }} -m "%s"
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "### 🔖 Bumped to v$VERSION (${{ inputs.bump }})" >> $GITHUB_STEP_SUMMARY

      - name: Push version commit and tag
        run: git push origin main --follow-tags

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          echo "### ✅ Released @rynfar/meridian@${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Published to npm" >> $GITHUB_STEP_SUMMARY
          echo "- 🏷️ Tagged v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 GitHub Release created" >> $GITHUB_STEP_SUMMARY
